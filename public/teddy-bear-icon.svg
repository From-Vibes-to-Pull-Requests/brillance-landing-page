<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="20" cy="16" rx="12" ry="11" fill="#C4A574"/>
  <ellipse cx="20" cy="16" rx="12" ry="11" stroke="#8B7355" stroke-width="1.2" fill="none"/>
  <!-- Ears -->
  <circle cx="9" cy="8" r="5" fill="#C4A574" stroke="#8B7355" stroke-width="1.2"/>
  <circle cx="31" cy="8" r="5" fill="#C4A574" stroke="#8B7355" stroke-width="1.2"/>
  <!-- Inner ears -->
  <circle cx="9" cy="8" r="2.5" fill="#E8D4B8"/>
  <circle cx="31" cy="8" r="2.5" fill="#E8D4B8"/>
  <!-- Face patch -->
  <ellipse cx="20" cy="18" rx="6" ry="5" fill="#E8D4B8"/>
  <!-- Eyes -->
  <circle cx="16" cy="14" r="2" fill="#37322F"/>
  <circle cx="24" cy="14" r="2" fill="#37322F"/>
  <circle cx="16.5" cy="13.5" r="0.5" fill="white"/>
  <circle cx="24.5" cy="13.5" r="0.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="20" cy="19" rx="2" ry="1.5" fill="#37322F"/>
  <!-- Smile -->
  <path d="M17 21.5 Q20 23 23 21.5" stroke="#8B7355" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <ellipse cx="20" cy="32" rx="10" ry="8" fill="#C4A574" stroke="#8B7355" stroke-width="1.2"/>
  <!-- Belly -->
  <ellipse cx="20" cy="32" rx="5" ry="4" fill="#E8D4B8"/>
  <!-- Arms (paws) -->
  <ellipse cx="10" cy="26" rx="3" ry="4" fill="#C4A574" stroke="#8B7355" stroke-width="1"/>
  <ellipse cx="30" cy="26" rx="3" ry="4" fill="#C4A574" stroke="#8B7355" stroke-width="1"/>
</svg>
