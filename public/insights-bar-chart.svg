  <rect x="16" y="12" width="120" height="16" rx="2" fill="#C2410C" opacity="0.9"/>
  <rect x="16" y="34" width="80" height="10" rx="2" fill="#e0e0e0"/>
  <!-- Bar chart area -->
  <rect x="48" y="52" width="320" height="168" rx="4" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Y-axis labels -->
  <rect x="56" y="60" width="24" height="8" rx="1" fill="#f0f0f0"/>
  <rect x="56" y="88" width="16" height="8" rx="1" fill="#f0f0f0"/>
