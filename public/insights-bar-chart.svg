  <!-- X-axis labels -->
  <rect x="100" y="228" width="28" height="8" rx="1" fill="#e8e8e8"/>
  <rect x="148" y="228" width="28" height="8" rx="1" fill="#e8e8e8"/>
  <rect x="196" y="228" width="28" height="8" rx="1" fill="#e8e8e8"/>
