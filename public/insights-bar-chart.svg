  <rect x="56" y="172" width="24" height="8" rx="1" fill="#f0f0f0"/>
  <!-- Bar chart columns -->
  <rect x="96" y="140" width="32" height="80" rx="4" fill="#C2410C" opacity="0.9"/>
  <rect x="144" y="108" width="32" height="112" rx="4" fill="#C2410C" opacity="0.85"/>
  <rect x="192" y="76" width="32" height="144" rx="4" fill="#C2410C" opacity="0.95"/>
